# Utensil default configuration
# Copy to /data/local/tmp/utensil/utensil.conf to customize

battery.enabled=true
battery.dynamic_threshold=25
battery.min_threshold=25
battery.max_threshold=60
battery.learn_min_points=5
battery.learn_max_points=25
battery.force_app_standby=false
battery.dnd_while_charging=false
battery.background_process_limit_low=2

thermal.enabled=false
thermal.charging_status=1
thermal.charging_done_status=0
thermal.discharging_normal=1
thermal.discharging_low=2
thermal.discharging_critical=3
thermal.critical_level=20

sensors.enabled=false
airplane.enabled=false
doze.enabled=true
drain.enabled=false
notification.enabled=false
logging.enabled=true
dry_run=false

compaction.enabled=true
compaction.hardlock_ticks=4

watchdog.enabled=false
watchdog.jobscheduler=false
watchdog.timeout_secs=300
watchdog.idle_threshold_secs=500
